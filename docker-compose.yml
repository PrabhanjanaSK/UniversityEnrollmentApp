services:
  student-service:
    build: ./student-service
    ports:
      - "8000"

  course-service:
    build: ./course-service
    ports:
      - "8001:8000"

  enrollment-service:
    build: ./enrollment-service
    ports:
      - "8002:8000"
    depends_on:
      - student-service
      - course-service

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8000"
    depends_on:
      - student-service
      - course-service
      - enrollment-service
